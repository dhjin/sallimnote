name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: 백엔드 (pytest · 테넌트 격리)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: pip install -r requirements-dev.txt
      - name: 테스트 (sqlite, PostgreSQL 불필요)
        run: pytest -q

  mobile:
    name: 모바일 (flutter analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: 플랫폼 스캐폴드 생성 (lib/ 보존)
        run: flutter create .
      - name: 의존성
        run: flutter pub get
      - name: 정적 분석
        run: flutter analyze

  build-apk:
    name: APK 빌드
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: 플랫폼 스캐폴드 생성
        run: flutter create .
      - name: 인터넷 권한 보장
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>|' "$MANIFEST"
            echo "인터넷 권한 추가됨"
          else
            echo "인터넷 권한 이미 존재"
          fi
      - name: 의존성
        run: flutter pub get
      - name: APK 빌드
        run: |
          flutter build apk \
            --dart-define=API_BASE_URL=https://sallimnote.thechurch-plus.org
      - name: APK 업로드 (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: sallimnote-${{ github.sha }}
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
