---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sallimnote-data
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: sallimnote-secret
  namespace: default
stringData:
  JWT_SECRET: "change-this-to-a-strong-random-secret"
  CORS_ORIGINS: "*"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sallimnote
  namespace: default
  labels:
    app: sallimnote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sallimnote
  template:
    metadata:
      labels:
        app: sallimnote
    spec:
      containers:
        - name: sallimnote
          image: 192.168.219.101:30500/sallimnote:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sallimnote-pg-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sallimnote-secret
                  key: JWT_SECRET
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: sallimnote-secret
                  key: CORS_ORIGINS
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: sallimnote
  namespace: default
spec:
  selector:
    app: sallimnote
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30881
  type: NodePort
